<div class="login-card" id="loginBox">
  <h2>Control de Acceso</h2>
  <p style="font-size: 14px; color: #666;">Ingresá la contraseña para acceder al generador de notas.</p>

  <div id="error-msg">Contraseña incorrecta</div>

<script>
// Hash SHA-256 verificado para la contraseña estricta "notasentrama$"
const hashCorrecto = "0be07d9f95780fe1655097b6ca053075677b102b4d1b033d45f3408560113171";

async function verificarClave() {
  const clave = document.getElementById('passwordField').value;
  
  const encoder = new TextEncoder();
  const data = encoder.encode(clave);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  if (hashHex === hashCorrecto) {
    sessionStorage.setItem('auth_tramas', 'true');
    cargarGenerador();
  } else {
    document.getElementById('error-msg').style.display = 'block';
  }
}

document.getElementById('passwordField').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    verificarClave();
  }
});

  document.documentElement.innerHTML = `

function ejecutarLogicaGenerador() {
  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function procesarTextoAHtml(texto) {
    texto = escapeHtml(texto);
    texto = texto.replace(/\r\n|\r/g, "\n");
    const bloques = texto.split("\n\n");
    let htmlResultado = "";

    bloques.forEach(bloque => {
      bloque = bloque.trim();
      if (!bloque) return;

      if (bloque.indexOf('## ') === 0) {
        htmlResultado += `      <h2>\${bloque.substring(3)}</h2>\n`;
      } else if (bloque.indexOf('### ') === 0) {
        htmlResultado += `      <h3>\${bloque.substring(4)}</h3>\n`;
      } else if (bloque.indexOf('&gt; ') === 0) {
        htmlResultado += `      <blockquote style="border-left: 3px solid var(--orange); padding: 0.5rem 0 0.5rem 1.8rem; margin: 2rem 0; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; color: var(--ink-soft); line-height: 1.6;">\n        "\${bloque.substring(5)}"\n      </blockquote>\n`;
      } else if (bloque === '---') {
        htmlResultado += `      <hr />\n`;
      } else if (bloque === '~~~') {
        htmlResultado += `      <div class="thread-divider">\n        <div class="thread-line"></div>\n        <svg width="80" height="20" viewBox="0 0 80 20" fill="none">\n          <path d="M2 10 C8 4,14 16,20 10 S32 4,40 10 S52 16,60 10 S70 5,78 10" stroke="#d95f1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>\n        </svg>\n        <div class="thread-line"></div>\n      </div>\n`;
      } else {
        const contenido = bloque.replace(/\n/g, "<br />");
        htmlResultado += `      <p>\n        \${contenido}\n      </p>\n`;
      }
    });

    return htmlResultado;
  }

  function generarSlug(text) {
    return text.toString().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, '-')
      .replace(/[^\w\-]+/g, '')
      .replace(/\-\-+/g, '-')
      .replace(/^-+/, '')
      .replace(/-+$/, '');
  }
